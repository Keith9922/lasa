name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
        env:
          # Build uses Edge runtime for /api/share-card; AI keys are not
          # required at build time. Empty values silence the warning.
          MINIMAX_API_KEY: ""
          MINIMAX_BASE_URL: ""
          MINIMAX_MODEL: ""
