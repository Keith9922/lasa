<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="拉啥 mascot">
  <title>拉啥 mascot</title>
  <defs>
    <linearGradient id="poo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A47148" />
      <stop offset="55%" stop-color="#7A4F2A" />
      <stop offset="100%" stop-color="#5A3818" />
    </linearGradient>
    <radialGradient id="shine" cx="0.3" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FFE2B8" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#FFE2B8" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#FFE2B8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bowl" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E0DC" />
    </radialGradient>
  </defs>

  <!-- Toilet base -->
  <ellipse cx="120" cy="200" rx="92" ry="14" fill="rgba(45,27,14,0.10)" />
  <path d="M52 192 Q52 168 78 162 L162 162 Q188 168 188 192 Q188 200 180 204 L60 204 Q52 200 52 192 Z" fill="#F5E6C8" stroke="#8B5A2B" stroke-width="2.5" />
  <!-- Toilet seat ring -->
  <ellipse cx="120" cy="166" rx="68" ry="14" fill="url(#bowl)" stroke="#8B5A2B" stroke-width="2.5" />

  <!-- Poo body: three soft curls stacked -->
  <g transform="translate(120 110)">
    <!-- bottom curl -->
    <path d="M-58 50 C -58 14, -38 -2, 0 0 C 38 -2, 58 14, 58 50 C 58 60, 30 64, 0 64 C -30 64, -58 60, -58 50 Z" fill="url(#poo)" />
    <!-- middle curl -->
    <path d="M-46 -2 C -46 -28, -28 -42, 0 -40 C 28 -42, 46 -28, 46 -2 C 46 8, 22 12, 0 12 C -22 12, -46 8, -46 -2 Z" fill="url(#poo)" />
    <!-- top curl -->
    <path d="M-32 -42 C -32 -62, -18 -72, 0 -72 C 18 -72, 32 -62, 32 -42 C 32 -34, 14 -30, 0 -30 C -14 -30, -32 -34, -32 -42 Z" fill="url(#poo)" />
    <!-- top tip -->
    <path d="M-10 -72 C -8 -82, 8 -82, 10 -72 C 6 -68, -6 -68, -10 -72 Z" fill="url(#poo)" />

    <!-- highlight sweep -->
    <ellipse cx="-18" cy="-18" rx="40" ry="60" fill="url(#shine)" />

    <!-- eyes -->
    <circle cx="-16" cy="-12" r="6.5" fill="#FFF" />
    <circle cx="20"  cy="-12" r="6.5" fill="#FFF" />
    <circle cx="-14" cy="-10" r="3.2" fill="#1F1410" />
    <circle cx="22"  cy="-10" r="3.2" fill="#1F1410" />
    <circle cx="-13" cy="-11.5" r="0.9" fill="#FFF" />
    <circle cx="23"  cy="-11.5" r="0.9" fill="#FFF" />

    <!-- smile -->
    <path d="M-14 8 Q 4 22, 22 8" fill="none" stroke="#1F1410" stroke-width="2.6" stroke-linecap="round" />

    <!-- blush -->
    <ellipse cx="-30" cy="6" rx="6" ry="3.5" fill="#E76F51" opacity="0.45" />
    <ellipse cx="36"  cy="6" rx="6" ry="3.5" fill="#E76F51" opacity="0.45" />
  </g>

  <!-- thought bubble -->
  <g opacity="0.85">
    <circle cx="200" cy="58" r="14" fill="#FFF" stroke="#8B5A2B" stroke-width="2" />
    <circle cx="180" cy="76" r="6"  fill="#FFF" stroke="#8B5A2B" stroke-width="2" />
    <circle cx="172" cy="86" r="3"  fill="#FFF" stroke="#8B5A2B" stroke-width="2" />
    <text x="200" y="64" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#8B5A2B">?</text>
  </g>

  <!-- tiny stink lines -->
  <g stroke="#8B5A2B" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M70 36 q 6 -10 0 -20" />
    <path d="M88 28 q 6 -10 0 -20" />
    <path d="M106 24 q 6 -10 0 -20" />
  </g>
</svg>
